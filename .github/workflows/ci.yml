name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install tsx for E2E tests
        run: pnpm add -D tsx

      - name: Build (for bundled CLI used by E2E)
        run: pnpm build

      - name: Copy tree-sitter WASM files next to dist
        run: |
          mkdir -p dist/wasm
          cp node_modules/.pnpm/web-tree-sitter@*/node_modules/web-tree-sitter/tree-sitter.wasm dist/wasm/ 2>/dev/null || true
          cp node_modules/.pnpm/tree-sitter-typescript@*/node_modules/tree-sitter-typescript/tree-sitter-typescript.wasm dist/wasm/ 2>/dev/null || true
          cp node_modules/.pnpm/tree-sitter-typescript@*/node_modules/tree-sitter-typescript/tree-sitter-tsx.wasm dist/wasm/ 2>/dev/null || true
          cp node_modules/.pnpm/tree-sitter-python@*/node_modules/tree-sitter-python/tree-sitter-python.wasm dist/wasm/ 2>/dev/null || true
          ls dist/wasm/

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  scan:
    name: Deep-slop scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Run deep-slop scan
        run: node dist/deep-slop-bundled.js scan . --exclude node_modules dist --json > scan-result.json

      - name: Check score threshold
        run: |
          SCORE=$(node -e "const d=require('./scan-result.json'); console.log(d.score)")
          echo "Score: $SCORE"
          if [ "$SCORE" -lt 40 ]; then
            echo "::error::Score $SCORE is below threshold 40"
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-result
          path: scan-result.json

  release:
    name: Publish to npm
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [test, scan]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish (dry-run on PR, real on tag)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm publish --dry-run --no-git-checks
          else
            pnpm publish --provenance --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
